<header class="header">
  <a class="skip-link" href="#main-content">Skip to content</a>

  <div class="header__inner">
    <a class="header__logo" routerLink="/">
      <span class="header__logo-text">GetOrderStack</span>
    </a>

    <nav class="header__nav" aria-label="Main navigation">
      <ul class="header__nav-list">
        @for (item of navItems; track item.route) {
          <li class="header__nav-item">
            <a
              class="header__nav-link"
              [routerLink]="item.route"
              routerLinkActive="header__nav-link--active"
              [routerLinkActiveOptions]="{ exact: item.route === '/' }">
              {{ item.label }}
            </a>
          </li>
        }
      </ul>
    </nav>

    <div class="header__actions">
      <gos-button variant="primary" size="sm" [routerLink]="cta.route">
        {{ cta.label }}
      </gos-button>
    </div>

    <button
      class="header__hamburger"
      type="button"
      [attr.aria-expanded]="mobileMenuOpen()"
      aria-controls="mobile-nav"
      aria-label="Toggle navigation menu"
      (click)="toggleMobileMenu()">
      <span class="header__hamburger-line" [class.header__hamburger-line--open]="mobileMenuOpen()"></span>
      <span class="header__hamburger-line" [class.header__hamburger-line--open]="mobileMenuOpen()"></span>
      <span class="header__hamburger-line" [class.header__hamburger-line--open]="mobileMenuOpen()"></span>
    </button>
  </div>
</header>

<gos-mobile-nav
  [isOpen]="mobileMenuOpen()"
  (closed)="closeMobileMenu()" />
