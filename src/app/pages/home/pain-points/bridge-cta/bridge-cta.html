<div class="bridge" role="complementary" aria-label="Call to action">
  <h3 class="bridge__headline">{{ config().headline }}</h3>
  <p class="bridge__subtext">{{ config().subtext }}</p>

  <div class="bridge__cta">
    <a [routerLink]="config().ctaRoute" class="bridge__cta-link">
      <gos-button
        variant="primary"
        size="lg"
        [attr.aria-label]="config().ctaAriaLabel">
        {{ config().ctaLabel }}
      </gos-button>
    </a>
  </div>

  <div class="bridge__arrow" aria-hidden="true">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14M19 12l-7 7-7-7" />
    </svg>
  </div>
</div>
