<div class="mockup">
  <div class="mockup__window">
    <div class="mockup__toolbar">
      <span class="mockup__dot mockup__dot--red"></span>
      <span class="mockup__dot mockup__dot--yellow"></span>
      <span class="mockup__dot mockup__dot--green"></span>
      <span class="mockup__toolbar-title">OrderStack Dashboard</span>
    </div>
    <div class="mockup__content">
      <!-- Sidebar -->
      <div class="mockup__sidebar">
        <div class="mockup__nav-item mockup__nav-item--active"></div>
        <div class="mockup__nav-item"></div>
        <div class="mockup__nav-item"></div>
        <div class="mockup__nav-item"></div>
        <div class="mockup__nav-item"></div>
      </div>
      <!-- Main area -->
      <div class="mockup__main">
        <!-- Metric cards row -->
        <div class="mockup__metrics">
          <div class="mockup__metric-card">
            <div class="mockup__metric-label"></div>
            <div class="mockup__metric-value mockup__metric-value--primary"></div>
          </div>
          <div class="mockup__metric-card">
            <div class="mockup__metric-label"></div>
            <div class="mockup__metric-value mockup__metric-value--accent"></div>
          </div>
          <div class="mockup__metric-card">
            <div class="mockup__metric-label"></div>
            <div class="mockup__metric-value mockup__metric-value--success"></div>
          </div>
        </div>
        <!-- Chart area -->
        <div class="mockup__chart">
          <div class="mockup__chart-header"></div>
          <div class="mockup__chart-bars">
            <div class="mockup__bar" style="--bar-height: 40%"></div>
            <div class="mockup__bar" style="--bar-height: 65%"></div>
            <div class="mockup__bar" style="--bar-height: 85%"></div>
            <div class="mockup__bar" style="--bar-height: 55%"></div>
            <div class="mockup__bar" style="--bar-height: 75%"></div>
            <div class="mockup__bar" style="--bar-height: 95%"></div>
            <div class="mockup__bar" style="--bar-height: 70%"></div>
          </div>
        </div>
        <!-- Recent orders list -->
        <div class="mockup__orders">
          <div class="mockup__order-row"></div>
          <div class="mockup__order-row"></div>
          <div class="mockup__order-row"></div>
        </div>
      </div>
    </div>
  </div>
</div>
